name: Weekly Gallup Baseline Update

on:
  schedule:
    # Friday 05:00 UTC = 2:00 PM KST — after Gallup Korea's Friday-morning
    # release, before the US news day. Second attempt Saturday in case the
    # release slipped or the wiki tables lagged.
    - cron: '0 5 * * 5'
    - cron: '0 5 * * 6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for new Gallup poll
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
        run: python gallup_update.py

      - name: Commit updated baseline
        run: |
          if git diff --quiet gallup_baseline.json; then
            echo "Baseline unchanged — nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gallup_baseline.json
          git commit -m "Update Gallup baseline (weekly auto-update) [skip ci]"
          git pull --rebase origin main || true
          git push
