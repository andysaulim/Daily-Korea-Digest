name: Daily Korea News Digest

on:
  schedule:
    # 6:00 AM ET = 11:00 AM UTC (EST) / 10:00 AM UTC (EDT)
    - cron: '0 10 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pages: write

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and send digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          WEB_URL: https://andysaulim.github.io/Daily-Korea-Digest
        run: python run.py

      - name: Update README with run stats
        run: python update_readme.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAT }}
          publish_dir: ./public
          keep_files: true

      - name: Commit updated README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Update README stats [skip ci]" && git push
