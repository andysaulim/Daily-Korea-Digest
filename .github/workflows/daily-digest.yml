name: Daily Korea News Digest

on:
  schedule:
    # 5:00 AM ET = 10:00 AM UTC (EST) / 9:00 AM UTC (EDT)
    # Using 9 AM UTC to cover EDT (summer time)
    - cron: '0 9 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and send digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
        run: python run.py
